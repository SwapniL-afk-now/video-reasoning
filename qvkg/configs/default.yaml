model:
  name: "Qwen/Qwen3.5-4B"
  tensor_parallel_size: 1
  gpu_memory_utilization: 0.85
  max_model_len: 65536
  max_images_per_prompt: 10
  min_pixels: 200704          # 256 * 28 * 28
  max_pixels: 1003520         # 1280 * 28 * 28

siglip:
  model_name: "google/siglip-so400m-patch14-384"

whisper:
  model_size: "large-v3"
  device: "cuda"
  compute_type: "float16"

sampler:
  frame_budget: 500
  target_fps: 1.0
  hard_boundary_thresh: 0.6
  soft_boundary_thresh: 0.35
  min_gap_sec: 5.0
  max_gap_sec: 30.0

graph:
  semantic_threshold: 0.78
  causal_min_confidence: 0.6
  character_similarity_threshold: 0.80

query:
  max_subgraph_nodes: 60
  max_keyframes_in_prompt: 6
  faiss_seed_k: 20
